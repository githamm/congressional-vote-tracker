name: Scrape Colorado congressional votes

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab, for testing

permissions:
  contents: write

concurrency:
  group: scrape-votes
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper (incremental)
        run: python vote_scraper.py --year "$(date -u +%Y)" --incremental

      - name: Commit and push if the data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_votes.csv
          if git diff --cached --quiet; then
            echo "No new or corrected roll calls -- nothing to commit."
          else
            git commit -m "Update vote data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
